services:
  - type: web
    name: suchka-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
    healthCheckPath: /health
    autoDeploy: true
